services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      JWT_SECRET_KEY: change-me-please-change-me
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/app
      CORS_ALLOW_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
